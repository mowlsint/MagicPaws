version: 3
name: MAGIC PAWS Geo Rules
description: Rules for event geolocation. v3 adds global maritime hub support, explicit false-positive guards, port-promotion
  rules and better handling for route/track OSINT.
priority:
- explicit_geo_coordinate
- navwarn_coordinate
- port_unlocode
- controlled_text_rule
- gazetteer_port_or_place
- gazetteer_sea_area_or_strait
- navtex_context
- navarea_context
- region_hint_only
precision_policy:
  explicit_geo_coordinate:
    precision: exact
    confidence: high
    map_marker: solid
    may_write_geo: true
  navwarn_coordinate:
    precision: exact_or_warning_coordinate
    confidence: high
    map_marker: solid
    may_write_geo: true
  port_unlocode:
    precision: port
    confidence: high
    map_marker: solid
    may_write_geo: true
  controlled_text_rule:
    precision: port_or_area
    confidence: medium_high
    map_marker: solid_soft_or_circle
    may_write_geo: true
    notes:
    - Use only for curated maritime locations and abbreviations with required context.
    - 'Examples: Gibraltar with naval/strait context; GOA only with Gulf-of-Aden context; GOO only with Hormuz/Oman/Iran context.'
  gazetteer_port_or_place:
    precision: port_or_place
    confidence: medium_high
    map_marker: solid_soft
    may_write_geo: true
  gazetteer_sea_area_or_strait:
    precision: area
    confidence: medium
    map_marker: circle
    may_write_geo: true
  navtex_context:
    precision: warning_context
    confidence: medium
    map_marker: soft_area
    may_write_geo: false
  navarea_context:
    precision: warning_area
    confidence: low_without_specific_place
    map_marker: none_or_large_area
    may_write_geo: false
  region_hint_only:
    precision: region
    confidence: low
    map_marker: no_exact_marker
    may_write_geo: false
ambiguity_policy:
  multiple_matches:
    action: store_candidates_do_not_pin
    field: geo_candidates
  generic_terms:
  - Channel
  - Sound
  - Belt
  - Bay
  - Port
  - Strait
  - The Gulf
  blocked_short_aliases:
  - Jose
  - Santos
  - Ford
  - Anson
  - Storis
  - Enterprise
  - Victoria
  require_maritime_context_for_generic_terms: true
  if_title_and_body_disagree:
    action: store_candidates_do_not_pin
  contextual_false_positives:
  - term: Hull
    block_when_near:
    - hull of
    - attached to hull
    - ship hull
    - vessel hull
    - tanker hull
    - carrier hull
    - on the hull
    - under the hull
    note: Do not resolve Hull as UK port when the word clearly means ship structure.
  - term: Santos
    block_bare_alias: true
    allow_when_near:
    - Port of Santos
    - Santos port
    - Santos Brazil
    - Porto de Santos
    note: Bare Santos is person/place ambiguous; require maritime/Brazil port context.
  - term: Channel
    block_bare_alias: true
    allow_when_near:
    - English Channel
    - Dover Strait
    - Kiel Canal
    - Suez Canal
    - Panama Canal
    note: Generic channel/canal terms need context.
