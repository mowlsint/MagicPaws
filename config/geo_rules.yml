output_shape:
  inferred_geo:
    geo:
      lat: number
      lon: number
      precision: exact|port|area|region|warning_context
      method: explicit_coordinate|navwarn_coordinate|controlled_text_rule|gazetteer_alias|unlocode|navtex_context|navarea_context
      matched_name: string
      matched_id: string
      radius_km: number|null
      confidence: high|medium_high|medium|low
      geo_role: event_location|topic_area|event_location_or_topic_area
      display_on_map: boolean
    geo_candidates:
    - matched_id: string
      matched_name: string
      matched_alias: string
      score: number
    region_labels:
    - REG:*
safety_notes:
- Do not infer exact coordinates from broad regions.
- Do not pin NAVAREA-only matches.
- Do not pin generic place names without maritime context.
- Do not pin ambiguous person/place aliases such as Jose, Santos, Ford or Anson.
- Show area matches as circles or soft markers.
- Keep source evidence visible in reports.
route_extraction_policy:
  enabled: true
  route_markers:
  - ->
  - →
  - from
  - to
  - via
  - passed
  - heading
  - destination
  - dest
  - arriving
  - departed
  notes:
  - Treat route waypoints as route evidence; do not overwrite exact event coordinates.
  - Use controlled/gazetteer places as waypoints when text contains explicit route language.
health_policy:
  geo_match_rate:
    green_min: 0.35
    orange_min: 0.15
    note: For mixed RSS/social OSINT, low exact-GEO share is normal. Red should mean truly poor geocoding, not merely many
      global articles.
  sources_count:
    prefer_fields:
    - source_hint.source
    - source_line
    - source_id
    - source_type
    - original_url
    - labels SRC:*
    - 'summary ### Quelle'
