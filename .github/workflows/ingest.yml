name: MagicPaws Ingest (hourly)

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write
  issues: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: magicpaws-ingest
  cancel-in-progress: false

jobs:
  ingest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node 24
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Show repo structure
        run: |
          echo "Root:"
          ls -la
          echo "Scripts:"
          ls -la scripts || true
          echo "Config:"
          ls -la config || true

      - name: Verify required files
        run: |
          test -f scripts/ingest.mjs
          test -f scripts/snapshot.mjs
          test -f config/sources.yml

      - name: Install dependencies
        run: |
          npm install yaml fast-xml-parser --no-audit --no-fund

      - name: Check script syntax
        run: |
          node --check scripts/ingest.mjs
          node --check scripts/snapshot.mjs

      - name: Run ingest
        run: node scripts/ingest.mjs
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GH_TOKEN: ${{ github.token }}
          NTFY_ENABLED: ${{ secrets.NTFY_ENABLED }}
          NTFY_URL: ${{ secrets.NTFY_URL }}
          NTFY_TOKEN: ${{ secrets.NTFY_TOKEN }}
          NTFY_MIN_LEVEL: HIGH

      - name: Decide whether to snapshot
        id: snapcheck
        shell: bash
        run: |
          HOUR="$(date -u +%H)"
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "run_snapshot=true" >> "$GITHUB_OUTPUT"
            echo "Manual run: snapshot enabled"
          elif (( 10#$HOUR % 3 == 0 )); then
            echo "run_snapshot=true" >> "$GITHUB_OUTPUT"
            echo "UTC hour $HOUR: snapshot enabled"
          else
            echo "run_snapshot=false" >> "$GITHUB_OUTPUT"
            echo "UTC hour $HOUR: snapshot skipped"
          fi

      - name: Run sensor snapshot
        if: steps.snapcheck.outputs.run_snapshot == 'true'
        run: node scripts/snapshot.mjs
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GH_TOKEN: ${{ github.token }}

      - name: Verify canonical sensor files
        if: steps.snapcheck.outputs.run_snapshot == 'true'
        shell: bash
        run: |
          node <<'NODE'
          const fs = require('node:fs');
          for (const p of ['data/snapshots/voodoo_sensor_latest.json','data/snapshots/magicpaws_sensor_latest.json']) {
            const d = JSON.parse(fs.readFileSync(p,'utf8'));
            console.log(`${p}: hybrid_threat_index_pct=${d?.sensors?.hybrid_threat_index_pct}, ntfy_hybrid_alert_pct=${d?.sensors?.ntfy_hybrid_alert_pct}`);
            if (!Number.isFinite(Number(d?.sensors?.hybrid_threat_index_pct))) process.exitCode = 1;
          }
          NODE

      - name: Commit sensor snapshot
        if: steps.snapcheck.outputs.run_snapshot == 'true'
        shell: bash
        run: |
          set -e
          BRANCH="${GITHUB_REF_NAME:-main}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git pull --rebase --autostash origin "$BRANCH"

          git add data/snapshots/voodoo_sensor_snapshots.ndjson 2>/dev/null || true
          git add data/snapshots/voodoo_sensor_latest.json 2>/dev/null || true
          git add data/snapshots/magicpaws_sensor_latest.json 2>/dev/null || true

          echo "Git status after staging:"
          git status --short

          if git diff --cached --quiet; then
            echo "No snapshot changes to commit."
          else
            git commit -m "Add MagicPaws sensor snapshot"
            if ! git push origin "HEAD:$BRANCH"; then
              echo "Initial push failed; rebasing once and retrying."
              git pull --rebase --autostash origin "$BRANCH"
              git push origin "HEAD:$BRANCH"
            fi
          fi
