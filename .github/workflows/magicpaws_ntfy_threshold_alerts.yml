name: Magic Paws ntfy Threshold Alerts

on:
  workflow_dispatch:
  schedule:
    # Automated threshold check. The script sends only after a metric stayed
    # above threshold for two consecutive workflow runs.
    - cron: "*/30 * * * *"

permissions:
  contents: write

concurrency:
  group: magicpaws-ntfy-threshold-alerts
  cancel-in-progress: false

jobs:
  threshold-alerts:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Prepare and validate ntfy environment
        shell: bash
        env:
          RAW_NTFY_ENABLED: ${{ secrets.NTFY_ENABLED }}
          RAW_NTFY_URL: ${{ secrets.NTFY_URL }}
          RAW_NTFY_TOKEN: ${{ secrets.NTFY_TOKEN }}
        run: |
          node <<'NODE'
          const fs = require("node:fs");
          const envFile = process.env.GITHUB_ENV;

          function clean(value) {
            return String(value || "")
              .trim()
              .replace(/^["'`]+|["'`]+$/g, "")
              .trim();
          }

          function isTruthy(value) {
            return ["1", "true", "yes", "on"].includes(clean(value).toLowerCase());
          }

          function exportEnv(key, value) {
            const v = String(value ?? "");
            if (v.includes("\n") || v.includes("\r")) {
              const delim = `EOF_${Math.random().toString(16).slice(2)}`;
              fs.appendFileSync(envFile, `${key}<<${delim}\n${v}\n${delim}\n`);
            } else {
              fs.appendFileSync(envFile, `${key}=${v}\n`);
            }
          }

          const enabled = isTruthy(process.env.RAW_NTFY_ENABLED);
          const url = clean(process.env.RAW_NTFY_URL);
          const token = clean(process.env.RAW_NTFY_TOKEN);

          if (url) console.log(`::add-mask::${url}`);
          if (token) console.log(`::add-mask::${token}`);

          console.log("NTFY_ENABLED active:", enabled);
          console.log("NTFY_URL present:", Boolean(url));
          console.log("NTFY_URL starts with https:", url.startsWith("https://"));
          console.log("NTFY_TOKEN present:", Boolean(token));

          if (enabled) {
            if (!url) throw new Error("NTFY_ENABLED is active, but NTFY_URL is missing.");
            try {
              const parsed = new URL(url);
              if (!["https:", "http:"].includes(parsed.protocol)) throw new Error(`Unsupported protocol: ${parsed.protocol}`);
              if (!parsed.pathname || parsed.pathname === "/") throw new Error("NTFY_URL has no topic path. Expected format: https://ntfy.sh/<topic>");
              console.log("NTFY_URL parse: ok");
            } catch {
              throw new Error("NTFY_URL is not a valid absolute ntfy topic URL. Expected format: https://ntfy.sh/<topic>");
            }
          } else {
            console.log("ntfy is disabled. URL validation is non-blocking.");
          }

          exportEnv("NTFY_ENABLED", enabled ? "true" : "false");
          exportEnv("NTFY_URL", url);
          exportEnv("NTFY_TOKEN", token);
          NODE

      - name: Run Magic Paws threshold alert check
        env:
          MAGICPAWS_ALERT_HYBRID_THRESHOLD: "75"
          MAGICPAWS_ALERT_WEIRDNESS_THRESHOLD: "60"
          MAGICPAWS_ALERT_REQUIRED_HIGH_RUNS: "2"
          MAGICPAWS_ALERT_COOLDOWN_MINUTES: "0"
          MAGICPAWS_ALERT_WRITE_STATE_EVERY_RUN: "false"
          # Sensor snapshots are normally refreshed by the ingest/snapshot flow.
          # Keep this wider than the 02:00/14:00 UTC visual snapshot cadence.
          MAGICPAWS_SENSOR_MAX_AGE_HOURS: "18"
          # Safety: legacy daily proxy values must not trigger ntfy Hybrid alerts.
          MAGICPAWS_ALLOW_LEGACY_HYBRID_SOURCE: "false"
        run: node scripts/magicpaws_ntfy_threshold_alerts.mjs

      - name: Commit threshold alert state when changed
        if: always()
        shell: bash
        run: |
          set -e

          STATE_FILE="data/live/magicpaws_threshold_alert_state.json"
          BRANCH="${GITHUB_REF_NAME:-main}"

          if [ ! -f "$STATE_FILE" ]; then
            echo "No threshold alert state file exists. Nothing to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add "$STATE_FILE"

          if git diff --cached --quiet; then
            echo "No threshold alert state changes to commit."
            exit 0
          fi

          git pull --rebase --autostash origin "$BRANCH"
          git add "$STATE_FILE"
          git commit -m "chore: update Magic Paws ntfy threshold state"
          git push origin "HEAD:$BRANCH"
