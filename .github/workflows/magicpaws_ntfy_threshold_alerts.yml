name: Magic Paws ntfy Threshold Alerts

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  threshold-alerts:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run threshold alert check
        env:
          NTFY_ENABLED: ${{ secrets.NTFY_ENABLED }}
          NTFY_URL: ${{ secrets.NTFY_URL }}
          NTFY_TOKEN: ${{ secrets.NTFY_TOKEN }}
          MAGICPAWS_ALERT_HYBRID_THRESHOLD: "75"
          MAGICPAWS_ALERT_WEIRDNESS_THRESHOLD: "60"
          MAGICPAWS_ALERT_COOLDOWN_MINUTES: "180"
        run: node scripts/magicpaws_ntfy_threshold_alerts.mjs

      - name: Commit alert state when changed
        if: always()
        run: |
          if [ ! -f data/live/magicpaws_threshold_alert_state.json ]; then
            echo "No threshold alert state file changed."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/live/magicpaws_threshold_alert_state.json
          git diff --cached --quiet || git commit -m "chore: update Magic Paws threshold alert state"
          git push
