name: MagicPaws Daily Visual Snapshot

on:
  workflow_dispatch: {}
  schedule:
    # Zwei feste Snapshot-Läufe pro Tag, jeweils UTC.
    - cron: "0 2,14 * * *"

permissions:
  contents: write

concurrency:
  group: magicpaws-daily-visual-snapshot
  cancel-in-progress: false

jobs:
  daily-visual-snapshot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install runtime dependencies
        shell: bash
        run: |
          set -e

          # Installiere Repo-Dependencies, falls vorhanden.
          if [ -f package-lock.json ]; then
            npm ci
          elif [ -f package.json ]; then
            npm install
          else
            echo "No package.json found; using ad-hoc runtime dependencies."
          fi

          # Diese Abhängigkeiten werden von snapshot.mjs und dem Playwright-Renderer benötigt.
          # Wichtig: Playwright wird hier bewusst unabhängig von package.json installiert,
          # weil scripts/render_magicpaws_snapshot.mjs direkt 'playwright' importiert.
          npm install yaml fast-xml-parser playwright --no-audit --no-fund
          npx playwright install --with-deps chromium

      - name: Check script syntax
        shell: bash
        run: |
          set -e
          node --check scripts/snapshot.mjs

          if [ -f scripts/render_magicpaws_snapshot.mjs ]; then
            node --check scripts/render_magicpaws_snapshot.mjs
          fi
          if [ -f scripts/render_magicpaws_snapshot.js ]; then
            node --check scripts/render_magicpaws_snapshot.js
          fi
          if [ -f scripts/render_snapshot.mjs ]; then
            node --check scripts/render_snapshot.mjs
          fi
          if [ -f scripts/render_snapshot.js ]; then
            node --check scripts/render_snapshot.js
          fi

      - name: Refresh Magic Paws sensor snapshot for this visual snapshot
        shell: bash
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GH_TOKEN: ${{ github.token }}
          SNAPSHOT_BUCKET_HOURS: "3"
        run: |
          set -e
          node scripts/snapshot.mjs

      - name: Render Magic Paws visual snapshot
        shell: bash
        env:
          SNAPSHOT_RUN_UTC: ${{ github.event.schedule || 'manual' }}
        run: |
          set -e
          if [ -f scripts/render_magicpaws_snapshot.mjs ]; then
            node scripts/render_magicpaws_snapshot.mjs
          elif [ -f scripts/render_magicpaws_snapshot.js ]; then
            node scripts/render_magicpaws_snapshot.js
          elif [ -f scripts/render_snapshot.mjs ]; then
            node scripts/render_snapshot.mjs
          elif [ -f scripts/render_snapshot.js ]; then
            node scripts/render_snapshot.js
          else
            echo "No visual snapshot render script found. Expected one of:"
            echo "  scripts/render_magicpaws_snapshot.mjs"
            echo "  scripts/render_magicpaws_snapshot.js"
            echo "  scripts/render_snapshot.mjs"
            echo "  scripts/render_snapshot.js"
            exit 1
          fi

      - name: Commit generated snapshot artifacts
        shell: bash
        run: |
          set -e
          BRANCH="${GITHUB_REF_NAME:-main}"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Sensor- und Renderer-Artefakte. Bewusst breit, aber auf Snapshot-/Report-Orte begrenzt.
          git add data/snapshots public/snapshots docs/snapshots reports/snapshots snapshot.html 2>/dev/null || true
          git add *.pdf *.png 2>/dev/null || true

          if git diff --cached --quiet; then
            echo "No visual snapshot changes to commit."
            exit 0
          fi

          git pull --rebase --autostash origin "$BRANCH"
          git add data/snapshots public/snapshots docs/snapshots reports/snapshots snapshot.html 2>/dev/null || true
          git add *.pdf *.png 2>/dev/null || true
          git commit -m "chore: update Magic Paws visual snapshot"
          git push origin "HEAD:$BRANCH"
