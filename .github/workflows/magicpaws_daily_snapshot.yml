name: MagicPaws Daily Visual Snapshot

on:
  workflow_dispatch: {}
  schedule:
    # Zwei feste Snapshot-Läufe pro Tag, jeweils UTC.
    - cron: "0 2,14 * * *"

permissions:
  contents: write

concurrency:
  group: magicpaws-daily-visual-snapshot
  cancel-in-progress: false

jobs:
  daily-visual-snapshot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install runtime dependencies
        shell: bash
        run: |
          set -e

          if [ -f package-lock.json ]; then
            npm ci
          elif [ -f package.json ]; then
            npm install
          else
            echo "No package.json found; using ad-hoc runtime dependencies."
          fi

          npm install yaml fast-xml-parser playwright --no-audit --no-fund
          npx playwright install --with-deps chromium

      - name: Check script syntax
        shell: bash
        run: |
          set -e
          node --check scripts/snapshot.mjs

          if [ -f scripts/render_magicpaws_snapshot.mjs ]; then
            node --check scripts/render_magicpaws_snapshot.mjs
          fi
          if [ -f scripts/render_magicpaws_snapshot.js ]; then
            node --check scripts/render_magicpaws_snapshot.js
          fi
          if [ -f scripts/render_snapshot.mjs ]; then
            node --check scripts/render_snapshot.mjs
          fi
          if [ -f scripts/render_snapshot.js ]; then
            node --check scripts/render_snapshot.js
          fi

      - name: Refresh Magic Paws sensor snapshot for this visual snapshot
        shell: bash
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GH_TOKEN: ${{ github.token }}
          SNAPSHOT_BUCKET_HOURS: "3"
        run: |
          set -e
          node scripts/snapshot.mjs

      - name: Verify canonical sensor files before rendering
        shell: bash
        run: |
          set -e
          node <<'NODE'
          const fs = require('node:fs');

          const paths = [
            'data/snapshots/voodoo_sensor_latest.json',
            'data/snapshots/magicpaws_sensor_latest.json'
          ];

          let failed = false;

          for (const p of paths) {
            if (!fs.existsSync(p)) {
              console.error(`${p}: MISSING`);
              failed = true;
              continue;
            }

            let data;
            try {
              data = JSON.parse(fs.readFileSync(p, 'utf8'));
            } catch (err) {
              console.error(`${p}: JSON parse failed: ${err.message}`);
              failed = true;
              continue;
            }

            const s = data.sensors || {};
            const hybrid = s.hybrid_threat_index_pct;
            const ntfy = s.ntfy_hybrid_alert_pct;
            const model = s.hybrid_index_model_version || '(missing model version)';
            const ts = data.ts || data.generated_at || data.snapshot_key || '(missing timestamp)';

            console.log(`${p}:`);
            console.log(`  timestamp: ${ts}`);
            console.log(`  hybrid_threat_index_pct: ${hybrid}`);
            console.log(`  ntfy_hybrid_alert_pct: ${ntfy}`);
            console.log(`  model: ${model}`);

            if (!Number.isFinite(Number(hybrid))) {
              console.error(`${p}: missing sensors.hybrid_threat_index_pct`);
              failed = true;
            }
            if (!Number.isFinite(Number(ntfy))) {
              console.error(`${p}: missing sensors.ntfy_hybrid_alert_pct`);
              failed = true;
            }
          }

          if (failed) process.exit(1);
          NODE

      - name: Render Magic Paws visual snapshot
        shell: bash
        env:
          SNAPSHOT_RUN_UTC: ${{ github.event.schedule || 'manual' }}
        run: |
          set -e
          if [ -f scripts/render_magicpaws_snapshot.mjs ]; then
            node scripts/render_magicpaws_snapshot.mjs
          elif [ -f scripts/render_magicpaws_snapshot.js ]; then
            node scripts/render_magicpaws_snapshot.js
          elif [ -f scripts/render_snapshot.mjs ]; then
            node scripts/render_snapshot.mjs
          elif [ -f scripts/render_snapshot.js ]; then
            node scripts/render_snapshot.js
          else
            echo "No visual snapshot render script found. Expected one of:"
            echo "  scripts/render_magicpaws_snapshot.mjs"
            echo "  scripts/render_magicpaws_snapshot.js"
            echo "  scripts/render_snapshot.mjs"
            echo "  scripts/render_snapshot.js"
            exit 1
          fi

      - name: Commit generated snapshot artifacts
        shell: bash
        run: |
          set -e
          BRANCH="${GITHUB_REF_NAME:-main}"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Rebase before staging so generated files are re-applied cleanly if another workflow pushed meanwhile.
          git pull --rebase --autostash origin "$BRANCH"

          # Explicitly stage the canonical sensor latest files. Do not rely on broad directory add only.
          git add data/snapshots/voodoo_sensor_snapshots.ndjson 2>/dev/null || true
          git add data/snapshots/voodoo_sensor_latest.json 2>/dev/null || true
          git add data/snapshots/magicpaws_sensor_latest.json 2>/dev/null || true

          # Visual snapshot artifacts, if renderer produced them.
          git add public/snapshots docs/snapshots reports/snapshots snapshot.html 2>/dev/null || true
          git add *.pdf *.png 2>/dev/null || true

          echo "Git status after staging:"
          git status --short

          if git diff --cached --quiet; then
            echo "No visual snapshot changes to commit."
            exit 0
          fi

          git commit -m "chore: update Magic Paws visual snapshot and sensor latest"

          if ! git push origin "HEAD:$BRANCH"; then
            echo "Initial push failed; rebasing once and retrying."
            git pull --rebase --autostash origin "$BRANCH"
            git push origin "HEAD:$BRANCH"
          fi
