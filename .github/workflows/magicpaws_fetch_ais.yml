name: MAGIC PAWS fetch AISstream

on:
  workflow_dispatch:
  schedule:
    # Every 90 minutes UTC: 00:00, 01:30, 03:00, 04:30, ...
    - cron: "0 */3 * * *"
    - cron: "30 1-23/3 * * *"

permissions:
  contents: write

concurrency:
  group: magicpaws-fetch-ais
  cancel-in-progress: false

jobs:
  fetch-ais:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - name: Install dependencies
        run: npm install yaml ws
      - name: Fetch AISstream sample
        env:
          AISSTREAM_API_KEY: ${{ secrets.AISSTREAM_API_KEY }}
          # 30-minute AISstream listening window per workflow run.
          AIS_SAMPLE_SECONDS: "1800"
          # Raised for long samples over North Sea/Channel + Baltic boxes.
          AIS_MAX_MESSAGES: "75000"
          AIS_TRACK_HISTORY_TTL_HOURS: "24"
          # Evaluate the last 60 minutes; alert threshold remains 60 minutes below SOG limit.
          AIS_DRIFT_EVAL_LOOKBACK_HOURS: "1"
          AIS_DRIFT_ACTIVE_TTL_MINUTES: "120"
          AIS_DRIFT_SOG_MAX: "2.5"
          AIS_DRIFT_MIN_MINUTES: "60"
          AIS_DRIFT_DISPLAY_MIN_LENGTH_M: "34"
          AIS_DRIFT_NOTIFY_MIN_LENGTH_M: "40"
          AIS_DRIFT_ALERT_COOLDOWN_HOURS: "6"
          NTFY_ENABLED: ${{ secrets.NTFY_ENABLED }}
          NTFY_URL: ${{ secrets.NTFY_URL }}
          NTFY_TOKEN: ${{ secrets.NTFY_TOKEN }}
          NTFY_MIN_LEVEL: HIGH
          MAGICPAWS_DASHBOARD_URL: "https://mowlsint.github.io/MagicPaws/"
        run: node scripts/fetch_aisstream.mjs
      - name: Commit live AIS data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add \
            data/live/ais_latest.json \
            data/live/ais_history.ndjson \
            data/live/ais_track_history.ndjson \
            data/live/ais_drift_candidates.json \
            data/live/ais_vessel_static_cache.json \
            data/live/ais_drift_alert_state.json

          if git diff --cached --quiet; then
            echo "No AIS live data changes to commit."
            exit 0
          fi

          git commit -m "Update MAGIC PAWS AIS live sensor"

          echo "Rebasing on latest main before push..."
          git pull --rebase --autostash origin main

          echo "Pushing AIS live data..."
          if git push origin HEAD:main; then
            echo "Push successful."
            exit 0
          fi

          echo "First push failed. Retrying after fresh rebase..."
          git pull --rebase --autostash origin main
          git push origin HEAD:main
