name: MAGIC PAWS fetch ADS-B

on:
  workflow_dispatch:
  schedule:
    - cron: "*/15 * * * *"

permissions:
  contents: write

jobs:
  fetch-adsb:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install dependencies
        run: npm install yaml
      - name: Fetch ADS-B maritime tiles
        env:
          ADSB_API_BASE: "https://opendata.adsb.fi/api"
          ADSB_REQUEST_DELAY_MS: "1200"
        run: node scripts/fetch_adsb.mjs
      - name: Commit live ADS-B data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/live/adsb_latest.json data/live/adsb_history.ndjson
          git diff --cached --quiet || git commit -m "Update MAGIC PAWS ADS-B live sensor"
          git push
