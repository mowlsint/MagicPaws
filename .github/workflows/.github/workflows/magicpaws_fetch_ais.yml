name: MAGIC PAWS fetch AISstream

on:
  workflow_dispatch:
  schedule:
    - cron: "*/30 * * * *"

permissions:
  contents: write

jobs:
  fetch-ais:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install dependencies
        run: npm install yaml ws
      - name: Fetch AISstream sample
        env:
          AISSTREAM_API_KEY: ${{ secrets.AISSTREAM_API_KEY }}
          AIS_SAMPLE_SECONDS: "120"
          AIS_MAX_MESSAGES: "3000"
        run: node scripts/fetch_aisstream.mjs
      - name: Commit live AIS data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/live/ais_latest.json data/live/ais_history.ndjson
          git diff --cached --quiet || git commit -m "Update MAGIC PAWS AIS live sensor"
          git push
